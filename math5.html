<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מתמAIקה – המורה הפרטי שלך</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script>window.MathJax={tex:{inlineMath:[['$','$']],displayMath:[['$$','$$']]},startup:{typeset:false}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
:root{
  --bg:#0b0f19;--s1:#111827;--s2:#1f2937;--s3:#374151;
  --border:#30363d;--blue:#3b82f6;--purple:#8b5cf6;
  --green:#10b981;--red:#ef4444;--cyan:#06b6d4;
  --text:#f3f4f6;--muted:#9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-family:'Rubik',sans-serif;}

/* Mobile Header */
header{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--s1); padding:15px 20px; border-bottom:1px solid var(--border);
  box-shadow:0 4px 15px rgba(0,0,0,0.4); z-index:40; position:relative;
}
header h1{
  font-weight:900; font-size:1.5rem; margin:0;
  background:linear-gradient(to left,var(--cyan),var(--purple));
  -webkit-background-clip:text; color:transparent; letter-spacing:-0.5px;
}
.menu-btn{
  background:transparent; border:none; color:var(--text); font-size:1.8rem;
  cursor:pointer; outline:none; transition:transform 0.2s;
}
.menu-btn:active{transform:scale(0.8);}

/* Layout Container */
.app-container{flex:1; display:flex; position:relative; overflow:hidden;}

/* Sidebar (Drawer on Mobile) */
aside{
  position:absolute; top:0; right:-100%; width:85%; max-width:320px; height:100%;
  background:var(--s1); border-left:1px solid var(--border); display:flex; flex-direction:column;
  z-index:50; transition:right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); box-shadow:-5px 0 25px rgba(0,0,0,0.5);
}
aside.open{right:0;}
.overlay{
  position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6);
  z-index:45; opacity:0; pointer-events:none; transition:opacity 0.3s; backdrop-filter:blur(3px);
}
.overlay.show{opacity:1; pointer-events:all;}

.sidebar-header{padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}
.sidebar-header h2{font-size:1.2rem; color:var(--text);}
.close-btn{background:var(--s3); border:none; color:white; width:30px; height:30px; border-radius:50%; font-weight:bold; cursor:pointer;}

/* Level Selector */
.level-selector{margin:15px; background:var(--bg); padding:5px; border-radius:12px; border:1px solid var(--border); display:flex; gap:5px;}
.lvl-btn{flex:1; background:transparent; border:none; color:var(--muted); padding:12px 5px; font-size:0.85rem; font-weight:700; border-radius:8px; cursor:pointer; transition:all 0.3s;}
.lvl-btn.active{background:var(--blue); color:white; box-shadow:0 4px 12px rgba(59,130,246,0.4); transform:scale(1.05);}

/* Topics List */
.topics-list{flex:1; overflow-y:auto; padding:0 15px 20px 15px; display:flex; flex-direction:column; gap:10px;}
.topic-group-title{font-size:0.8rem; color:var(--purple); margin:15px 0 5px 0; font-weight:700; text-transform:uppercase; border-bottom:1px solid var(--s3); padding-bottom:5px;}
.sbtn{background:var(--s2); border:1px solid var(--border); color:var(--text); padding:14px; border-radius:14px; cursor:pointer; text-align:right; transition:all 0.2s; display:flex; flex-direction:column; gap:4px; font-size:1rem;}
.sbtn:active{transform:scale(0.96);}
.sbtn.act{background:rgba(59,130,246,0.15); border-color:var(--blue); border-right:4px solid var(--blue);}
.topic-desc{font-size:0.75rem; color:var(--muted); font-weight:400;}

/* Main Chat */
main{flex:1; display:flex; flex-direction:column; background:radial-gradient(circle at top right, #111827, #0b0f19); width:100%;}
#chat{flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:20px; scroll-behavior:smooth;}

/* Messages */
.m{
  max-width:90%; padding:18px; border-radius:20px; font-size:1.15rem; line-height:1.6; 
  font-family:'Frank Ruhl Libre', serif; animation:slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
  opacity:0; transform:translateY(20px); overflow-x:auto;
}
@keyframes slideUp{to{opacity:1;transform:translateY(0);}}
.m.user{align-self:flex-start; background:var(--s2); border:1px solid var(--border); border-bottom-right-radius:4px;}
.m.bot{align-self:flex-end; background:rgba(31,41,55,0.85); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.08); border-bottom-left-radius:4px; box-shadow:0 8px 25px rgba(0,0,0,0.25);}

/* Interactive Cards & Videos */
.q-card{background:rgba(0,0,0,0.3); border:1px solid var(--purple); border-right:4px solid var(--purple); border-radius:16px; padding:20px; margin-top:15px;}
.opt{display:grid; grid-template-columns:1fr; gap:10px; margin-top:15px;}
.obtn{background:var(--s3); border:1px solid var(--border); color:var(--text); padding:15px; border-radius:12px; cursor:pointer; text-align:right; font-size:1.1rem; transition:0.2s; font-family:'Frank Ruhl Libre', serif;}
.obtn:active:not(:disabled){transform:scale(0.98); background:var(--s2);}
.obtn.ok{background:rgba(16,185,129,0.2); color:#34d399; border-color:var(--green);}
.obtn.err{background:rgba(239,68,68,0.2); color:#f87171; border-color:var(--red); opacity:0.8;}
.fb{margin-top:15px; padding:15px; border-radius:10px; display:none; font-family:'Rubik', sans-serif; font-size:1rem; animation:fadeIn 0.3s;}

/* Video Button Style */
.video-link {
  display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #ef4444, #b91c1c);
  color: white; text-decoration: none; padding: 12px 18px; border-radius: 14px; margin: 15px 0;
  font-family: 'Rubik', sans-serif; font-weight: bold; font-size: 1rem; box-shadow: 0 4px 15px rgba(239,68,68,0.4);
  transition: transform 0.2s; animation: pulse 2s infinite;
}
.video-link:active { transform: scale(0.95); }
.video-icon { font-size: 1.5rem; background:white; color:#ef4444; border-radius:50%; width:30px; height:30px; display:flex; justify-content:center; align-items:center; }

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
  70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
  100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

/* Input Area Mobile Optimized */
.input-area{padding:15px; background:var(--s1); border-top:1px solid var(--border); display:flex; gap:10px; align-items:flex-end; padding-bottom:calc(15px + env(safe-area-inset-bottom));}
#ui{flex:1; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:14px 18px; color:var(--text); font-size:1.1rem; resize:none; max-height:120px; outline:none; font-family:'Rubik',sans-serif;}
#ui:focus{border-color:var(--blue);}
#sb{background:var(--blue); border:none; color:white; width:52px; height:52px; border-radius:50%; font-weight:800; cursor:pointer; display:flex; justify-content:center; align-items:center; transition:0.2s; box-shadow:0 4px 12px rgba(59,130,246,0.3);}
#sb:active:not(:disabled){transform:scale(0.9);}
#sb:disabled{opacity:0.5; background:var(--s3);}
#sb svg{width:24px; height:24px; fill:currentColor; transform:rotate(180deg); margin-right:4px;}

.typing{display:flex; gap:6px; padding:15px; align-self:flex-end;}
.dot{width:8px; height:8px; background:var(--blue); border-radius:50%; animation:bounce 1.4s infinite ease-in-out;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}

/* Desktop fix if opened on larger screens */
@media(min-width: 768px){
  aside{position:static; width:350px; max-width:none;}
  .overlay, .menu-btn, .close-btn {display:none;}
  header {display:none;}
}
</style>
</head>
<body>

<header>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <h1>מתמAIקה</h1>
  <div style="width:30px"></div> <!-- Spacer -->
</header>

<div class="app-container">
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2>בחר נושא</h2>
      <button class="close-btn" onclick="toggleMenu()">✕</button>
    </div>
    
    <div class="level-selector">
      <button class="lvl-btn active" onclick="setLevel('basic', this)">בסיס</button>
      <button class="lvl-btn" onclick="setLevel('advanced', this)">מתקדם</button>
      <button class="lvl-btn" onclick="setLevel('expert', this)">מומחה</button>
    </div>
    
    <div class="topics-list">
      <div class="topic-group-title">אלגברה וסדרות</div>
      <button class="sbtn" onclick="topicClick(this,'seq')">סדרות<span class="topic-desc">חשבונית, הנדסית ונסיגה</span></button>
      <button class="sbtn" onclick="topicClick(this,'ind')">אינדוקציה<span class="topic-desc">הוכחות שוויון ואי-שוויון</span></button>
      
      <div class="topic-group-title">גיאומטריה ואנליטית</div>
      <button class="sbtn" onclick="topicClick(this,'geo_e')">גיאומטריה<span class="topic-desc">משפטי דמיון, מעגל ופרופורציה</span></button>
      <button class="sbtn" onclick="topicClick(this,'anal_g')">אנליטית<span class="topic-desc">הישר, המעגל והיפרבולה</span></button>
      <button class="sbtn" onclick="topicClick(this,'vec')">וקטורים<span class="topic-desc">גיאומטריים ואלגבריים</span></button>
      
      <div class="topic-group-title">אנליזה (חדו"א)</div>
      <button class="sbtn" onclick="topicClick(this,'diff_poly')">רציונליות<span class="topic-desc">פולינומים ומשיקים</span></button>
      <button class="sbtn" onclick="topicClick(this,'diff_exp')">מעריכיות ולוג'<span class="topic-desc">פונקציות $e^x, \ln(x)$</span></button>
      <button class="sbtn" onclick="topicClick(this,'integral')">אינטגרלים<span class="topic-desc">חישובי שטחים ונפחים</span></button>
      
      <div class="topic-group-title">מרוכבים</div>
      <button class="sbtn" onclick="topicClick(this,'comp')">מספרים מרוכבים<span class="topic-desc">מישור גאוס וקוטבית</span></button>
    </div>
  </aside>

  <main>
    <div id="chat">
      <div class="m bot">
        אהלן! 👋<br>
        אני המורה הדיגיטלי שלך ל-5 יחידות במתמטיקה.<br><br>
        פתח את התפריט (☰) למעלה, בחר את הנושא שאתה רוצה ללמוד עכשיו, ונתחיל לתרגל יחד. אפשר גם לבחור את רמת הקושי שמתאימה לך!
      </div>
    </div>
    <div id="typing" class="typing" style="display:none">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="input-area">
      <textarea id="ui" placeholder="הקלד כאן..." rows="1"></textarea>
      <button id="sb" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg>
      </button>
    </div>
  </main>
</div>

<script>
const apiKey = ""; // API Key goes here
let currentLevel = 'basic';
let currentTopicKey = null;

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

const LEVEL_PROMPTS = {
  basic: "רמת בסיס: הסבר קצר ופשוט ביותר, מתאים למתחילים. הצג תרגיל קצר שלב-אחד.",
  advanced: "רמת מתקדם: שילוב חשיבה. תרגיל עם מספר שלבים וטכניקה אלגברית.",
  expert: "רמת מומחה (בגרות): הבא שאלת בגרות מלאה עם סעיפים (א, ב, ג), פרמטרים ודרישה להעמקה."
};

const TOPICS = {
  seq: "סדרות", ind: "אינדוקציה מתמטית", geo_e: "גיאומטריה אוקלידית",
  anal_g: "גיאומטריה אנליטית", vec: "וקטורים", diff_poly: "חדו''א - פולינומים ורציונליות",
  diff_exp: "חדו''א - פונקציות מעריכיות ולוגריתמיות", integral: "חשבון אינטגרלי", comp: "מספרים מרוכבים"
};

const SYS_PROMPT = `אתה "מתמAIקה", מורה פרטי ידידותי ל-5 יח"ל.
כללי ברזל:
1. השתמש ב-LaTeX לכל ביטוי מתמטי ($ $ או $$ $$).
2. **חשוב מאוד:** בכל פעם שאתה מסביר נושא חדש בפעם הראשונה, הוסף בתחילת התגובה כפתור בולט לסרטון ביוטיוב שקשור לנושא. השתמש בקוד HTML הזה בדיוק (החלף את ה-X בשם הנושא המדויק):
<a href="https://www.youtube.com/results?search_query=מתמטיקה+5+יחידות+X" target="_blank" class="video-link">
  <div class="video-icon">▶</div>
  צפה בסרטון הסבר ביוטיוב
</a>
3. פנה לתלמיד בגוף שני, תן פידבק חיובי והשתמש באימוג'י במידה.
4. לשאלות סגורות השתמש במבנה:
<div class="q-card">
  <div class="q-txt">השאלה...</div>
  <div class="opt">
    <button class="obtn" onclick="checkA(this, 'correct', 'הסבר מצוין!')">א. תשובה 1</button>
    <button class="obtn" onclick="checkA(this, 'wrong', 'נסה שוב')">ב. תשובה 2</button>
  </div>
  <div class="fb"></div>
</div>`;

let chatHistory = [];

function setLevel(lvl, btnEl) {
  currentLevel = lvl;
  document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  if(currentTopicKey) {
    sendMsg(`עבור לרמת ${btnEl.innerText} בנושא הנוכחי.`);
    if(window.innerWidth < 768) toggleMenu();
  }
}

function topicClick(btn, key) {
  currentTopicKey = key;
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('act'));
  btn.classList.add('act');
  if(window.innerWidth < 768) toggleMenu(); // Close menu on mobile
  sendMsg(`התחלנו נושא: ${TOPICS[key]}. רמה: ${LEVEL_PROMPTS[currentLevel]}. תן הסבר קצר על הנושא (כולל קישור לסרטון) ולאחריו תרגיל ראשון.`);
}

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'm ' + (role === 'user' ? 'user' : 'bot');
  div.innerHTML = text.replace(/\n/g, '<br>');
  chat.appendChild(div);
  
  // Scroll to bottom smoothly
  setTimeout(() => {
    chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
  }, 100);

  if (window.MathJax) MathJax.typesetPromise([div]);
}

window.checkA = function(el, status, expl) {
  const card = el.closest('.q-card');
  const fb = card.querySelector('.fb');
  const btns = card.querySelectorAll('.obtn');
  btns.forEach(b => b.disabled = true);
  fb.style.display = 'block';
  fb.innerHTML = (status === 'correct' ? '✅ ' : '❌ ') + expl;
  el.classList.add(status === 'correct' ? 'ok' : 'err');
  if (window.MathJax) MathJax.typesetPromise([fb]);
};

async function callGemini(messages) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
  const contents = messages.map(m => ({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] }));
  const payload = { contents, systemInstruction: { parts: [{ text: SYS_PROMPT }] } };
  const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
  const data = await resp.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text;
}

async function sendMsg(overrideText) {
  const ui = document.getElementById('ui');
  const text = (overrideText || ui.value).trim();
  if (!text) return;
  if(!overrideText) {
    ui.value = '';
    ui.style.height = 'auto'; // Reset height
  }
  
  document.getElementById('sb').disabled = true;
  addMsg('user', overrideText && text.includes("התחלנו") ? "התחל נושא: " + TOPICS[currentTopicKey] : text);
  document.getElementById('typing').style.display = 'flex';
  
  // Auto scroll for typing indicator
  const chat = document.getElementById('chat');
  chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });

  chatHistory.push({ role: 'user', content: text });
  try {
    const aiResp = await callGemini(chatHistory);
    document.getElementById('typing').style.display = 'none';
    addMsg('assistant', aiResp);
    chatHistory.push({ role: 'assistant', content: aiResp });
  } catch (err) {
    document.getElementById('typing').style.display = 'none';
    addMsg('assistant', "שגיאה בתקשורת. אנא נסה שוב.");
  } finally {
    document.getElementById('sb').disabled = false;
  }
}

document.getElementById('ui').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
